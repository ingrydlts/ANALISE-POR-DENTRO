name: Criar Tarefas Notion — Módulo 7

on:
  push:
    branches:
      - main
    paths:
      - 'insights.json'   # dispara APENAS quando insights.json muda

jobs:
  create-notion-tasks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Criar tarefas no Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
        run: python scripts/create_tasks.py
